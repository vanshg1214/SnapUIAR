<!DOCTYPE html>
<html>

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <title>A-Frame: Tap to Place Ground</title>
  <meta itemprop="name" content="A-Frame: Tap to Place Ground">
  <meta name="twitter:title" content="A-Frame: Tap to Place Ground">
  <meta property="og:title" content="A-Frame: Tap to Place Ground">
  <meta property="og:site_name" content="A-Frame: Tap to Place Ground">
  <meta name="description" content="This example allows the user to grow cacti 🌵  by tapping or clicking the ground. Showcases raycasting, spawning objects, and importing a 3D model.">
  <meta itemprop="description" content="This example allows the user to grow cacti 🌵  by tapping or clicking the ground. Showcases raycasting, spawning objects, and importing a 3D model.">
  <meta property="og:description" content="This example allows the user to grow cacti 🌵  by tapping or clicking the ground. Showcases raycasting, spawning objects, and importing a 3D model.">
  <meta name="twitter:description" content="This example allows the user to grow cacti 🌵  by tapping or clicking the ground. Showcases raycasting, spawning objects, and importing a 3D model.">
  <script crossorigin="anonymous" src="./external/scripts/8frame-1.5.0.min.js"></script>
  <script crossorigin="anonymous" src="./external/xrextras/xrextras.js"></script>
  <script crossorigin="anonymous" src="./external/landing-page/landing-page.js"></script>
  <script crossorigin="anonymous" src="./external/xr/xr.js" async="true" data-preload-chunks="slam">
  </script>

<!-- Use "8thwall:" meta tags to hook into 8th Wall's build process and developer tools. -->
<meta name="8thwall:renderer" content="aframe:1.5.0"/>
<meta name="8thwall:package" content="@8thwall.xrextras"/>
<meta name="8thwall:package" content="@8thwall.landing-page"/>

<!-- Add GIF for sharing -->
<meta property="og:image" content="https://i.giphy.com/media/rAi32DNlsWNpItOpDr/giphy.gif"/>

</head>

<body>
<script src="bundle.js"></script>
<!-- Copyright (c) 2022 8th Wall, Inc. -->
<!-- body.html is optional; elements will be added to your html body after app.js is loaded. -->

<div class="over">
  <span id="promptText">Tap To Place Model</span>
</div>

<!-- Bottom filter scrolling UI -->
<div class="capture-ring"></div>
<div class="filter-container" id="filterContainer">
  <div class="filter-button active" data-model="#pizzaModel">
    <img src="assets/pizza1.png" alt="Pizza 1">
  </div>
  <div class="filter-button" data-model="#pizza2Model">
    <img src="assets/pizza2.png" alt="Pizza 2">
  </div>
  <div class="filter-button" data-model="#krabbyPattyModel">
    <img src="assets/burger1.png" alt="Krabby Patty">
  </div>
  <div class="filter-button" data-model="#classicBurgerModel">
    <img src="assets/burger2.png" alt="Classic Burger">
  </div>
</div>

<!-- Play Animation button — only visible for models with GLTF animations -->
<button id="playAnimBtn" class="play-anim-btn" style="display: none;">▶ Play</button>

<!-- Add the tap-place component to the scene so it has an effect -->
<a-scene
  xrextras-gesture-detector
  tap-place
  landing-page
  xrextras-loading
  xrextras-runtime-error
  xrextras-realtime-occlusion
  renderer="colorManagement:true"
  xrweb="
    allowedDevices: any;
    enableDepth: true;
    defaultEnvironmentFogIntensity: 0.5; 
    defaultEnvironmentFloorTexture: #groundTex; 
    defaultEnvironmentFloorColor: #FFF;
    defaultEnvironmentSkyBottomColor: #B4C4CC; 
    defaultEnvironmentSkyTopColor: #5ac8fa;
    defaultEnvironmentSkyGradientStrength: 0.5;">

  <!-- We can define assets here to be loaded when A-Frame initializes -->
  <a-assets>
    <img id="groundTex" src="assets/sand.jpg">
    <a-asset-item id="pizzaModel" src="assets/pizza.glb"></a-asset-item>
    <a-asset-item id="pizza2Model" src="assets/pizza2.glb"></a-asset-item>
    <a-asset-item id="krabbyPattyModel" src="assets/krabby_patty_burger (1).glb"></a-asset-item>
    <a-asset-item id="classicBurgerModel" src="assets/back_yard_burgers_-_classic_burger.glb"></a-asset-item>
  </a-assets>

  <!-- The raycaster will emit mouse events on scene objects specified with the cantap class -->
  <a-camera
    id="camera"
    position="0 8 8"
    raycaster="objects: .cantap"
    cursor="
      fuse: false;
      rayOrigin: mouse;">
  </a-camera>

  <a-entity
    light="
      type: directional;
      intensity: 0.8;
      castShadow: true;
      shadowMapHeight:2048;
      shadowMapWidth:2048;
      shadowCameraTop: 40;
      shadowCameraBottom: -40;
      shadowCameraRight: 40;
      shadowCameraLeft: -40;
      target: #camera"
    xrextras-attach="target: camera; offset: 8 15 4"
    position="1 4.3 2.5"
    shadow>
  </a-entity>

  <a-light type="ambient" intensity="0.5"></a-light>

  <!-- Adding the cantap class allows the ground to be clicked -->
  <a-box
    id="ground"
    class="cantap"
    scale="1000 2 1000"
    position="0 -0.99 0"
    material="shader: shadow; transparent: true; opacity: 0.4"
    shadow>
  </a-box>
</a-scene>

</body>

</html>
